services:
  - type: web
    name: al-siraj-clinic
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter          # الخطة المدفوعة الأرخص - مطلوبة للقرص الدائم (Disk)
    healthCheckPath: /api/health
    disk:
      name: clinic-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /var/data/clinic.db
      - key: SECRETARY_PIN
        sync: false          # تُدخله بنفسك من لوحة Render (لن يُحفظ بالكود)
      - key: DOCTOR_PIN
        sync: false          # تُدخله بنفسك من لوحة Render (لن يُحفظ بالكود)
      - key: CORS_ORIGINS
        value: "*"           # نفس الموقع يخدم الواجهتين، فلا حاجة لتقييد صارم
